name: Development Build and Release

on:
  push:
    branches:
      - dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%dT%H_%M_%S%z')" >> $GITHUB_OUTPUT
    
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'oracle'
          java-version: '20'

      - name: Build with Maven
        run: mvn clean package

      - name: Upload JAR file
        uses: actions/upload-artifact@v3
        with:
          name: qBuddy.jar
          path: /home/runner/work/qBuddy/qBuddy/build/*.jar

      - name: Create Release
        id: create_release
        uses: ncipollo/release-action@v1.12.0
        with:
          artifacts: "build/*.jar"
          prerelease: true
          tag: devbuild-${{ steps.date.outputs.date }}
